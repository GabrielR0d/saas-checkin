version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: saascheckin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  pgdata:
